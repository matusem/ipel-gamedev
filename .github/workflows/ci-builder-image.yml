name: CI Builder Image

on:
  push:
    branches: [main, master]
    paths:
      - framework/docker/ci-builder/**
      - .github/workflows/ci-builder-image.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BUILDER_IMAGE_NAME: ${{ github.repository }}-builder

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="${GHCR_TOKEN:-$GITHUB_TOKEN}"
          echo "$TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BUILDER_IMAGE_NAME }}
          tags: |
            type=raw,value=bookworm
            type=raw,value=latest

      - name: Build and push CI builder
        uses: docker/build-push-action@v6
        with:
          context: framework/docker/ci-builder
          file: framework/docker/ci-builder/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify builder tools on PATH
        run: |
          set -euo pipefail
          IMAGE="${{ env.REGISTRY }}/${{ env.BUILDER_IMAGE_NAME }}:bookworm"
          docker pull "${IMAGE}"
          docker run --rm --entrypoint sh "${IMAGE}" -c \
            'cargo-chef --version && dx --version && cargo-component --version'

      - name: Image URL
        run: |
          echo "Pull with:"
          echo "  docker pull ${{ env.REGISTRY }}/${{ env.BUILDER_IMAGE_NAME }}:bookworm"
          echo "Build arg for framework/Dockerfile:"
          echo "  BUILDER_IMAGE=${{ env.REGISTRY }}/${{ env.BUILDER_IMAGE_NAME }}:bookworm"
