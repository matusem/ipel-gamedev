name: Reusable — build gamedev-cli

on:
  workflow_call:
    inputs:
      checkout_ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: framework

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            is_windows: true
            asset_key: windows-x86_64
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            is_windows: false
            asset_key: linux-x86_64
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            is_windows: false
            asset_key: linux-aarch64
          - target: x86_64-apple-darwin
            runner: macos-latest
            is_windows: false
            asset_key: macos-x86_64
          - target: aarch64-apple-darwin
            runner: macos-latest
            is_windows: false
            asset_key: macos-aarch64

    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: framework
          shared-key: gamedev-cli-${{ matrix.target }}
          cache-all-crates: true
          cache-on-failure: true

      - name: Cache apt packages (aarch64 cross toolchain)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        uses: actions/cache@v4
        with:
          path: ~/ci-apt-cache/archives
          key: apt-aarch64-${{ runner.os }}-v1
          restore-keys: |
            apt-aarch64-${{ runner.os }}-v1

      - name: Install aarch64 Linux cross toolchain
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo mkdir -p ~/ci-apt-cache/archives/partial
          echo 'Dir::Cache::archives "'"$HOME"'/ci-apt-cache/archives";' | sudo tee /etc/apt/apt.conf.d/99-ci-cache
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          mkdir -p ~/.cargo
          printf '%s\n' \
            '[target.aarch64-unknown-linux-gnu]' \
            'linker = "aarch64-linux-gnu-gcc"' \
            >> ~/.cargo/config.toml

      - name: Build gamedev-cli
        run: cargo build --release -p gamedev-cli --features packaged --target ${{ matrix.target }}

      - name: Package (Unix)
        if: ${{ !matrix.is_windows }}
        run: |
          NAME="gamedev-cli-${{ matrix.asset_key }}"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/gamedev-cli" "dist/gamedev"
          chmod +x dist/gamedev
          tar -czf "dist/${NAME}.tar.gz" -C dist gamedev
          sha256sum "dist/${NAME}.tar.gz" | tee "dist/${NAME}.sha256"

      - name: Package (Windows)
        if: matrix.is_windows
        shell: pwsh
        run: |
          $Name = "gamedev-cli-${{ matrix.asset_key }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/gamedev-cli.exe" "dist/gamedev.exe"
          Compress-Archive -Path dist/gamedev.exe -DestinationPath "dist/$Name.zip" -Force
          $hash = (Get-FileHash "dist/$Name.zip" -Algorithm SHA256).Hash.ToLower()
          Set-Content -Path "dist/$Name.sha256" -Value "$hash  $Name.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.asset_key }}
          path: framework/dist/*
