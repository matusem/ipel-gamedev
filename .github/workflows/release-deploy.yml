name: Release and Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.2.3); used when not triggered by a tag push"
        required: true
        type: string
      deploy:
        description: "Call deploy webhook after image push"
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILDER_IMAGE: ghcr.io/${{ github.repository }}-builder:bookworm
  RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  build-image:
    runs-on: ubuntu-latest
    steps:
      - name: Verify release tag exists
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ inputs.tag }}"
          if ! gh api "repos/${{ github.repository }}/git/refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag '${TAG}' was not found on GitHub."
            echo "Push the tag first (git push origin ${TAG}) or run the workflow with an existing tag."
            gh api "repos/${{ github.repository }}/tags" --jq '.[].name' | head -20 || true
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref || format('refs/tags/{0}', inputs.tag) }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ env.RELEASE_TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.RELEASE_TAG }}
            type=raw,value=latest,enable=${{ env.RELEASE_TAG != '' }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: framework
          file: framework/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            BUILDER_IMAGE=${{ env.BUILDER_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-image
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install signing dependency
        run: pip install pynacl

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_PRIVATE_KEY: ${{ secrets.DEPLOY_WEBHOOK_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          python3 framework/scripts/trigger-deploy-webhook.py \
            --image "${REGISTRY}/${IMAGE_NAME}" \
            --tag "${VERSION}"

      - name: Wait for health
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          BASE="${DEPLOY_WEBHOOK_URL%/}"
          for i in $(seq 1 60); do
            if curl -fsS "${BASE}/health" >/dev/null; then
              echo "healthy"
              exit 0
            fi
            echo "waiting for ${BASE}/health ($i/60)..."
            sleep 5
          done
          echo "health check timed out" >&2
          exit 1
