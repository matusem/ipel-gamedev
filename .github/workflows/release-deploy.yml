name: Release and Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or existing tag to build (e.g. main or v0.1.5)"
        default: "main"
        type: string
      release_tag:
        description: "GHCR version label (e.g. v0.1.6). Required when ref is a branch."
        required: false
        type: string
      deploy:
        description: "Call deploy webhook after image push"
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILDER_IMAGE: ghcr.io/${{ github.repository }}-builder:bookworm

permissions:
  contents: read
  packages: write
  actions: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve build ref
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.ref }}"
            RELEASE="${{ inputs.release_tag }}"
            if gh api "repos/${{ github.repository }}/git/refs/tags/${REF}" >/dev/null 2>&1; then
              echo "checkout_ref=refs/tags/${REF}" >> "$GITHUB_OUTPUT"
              echo "release_tag=${RELEASE:-$REF}" >> "$GITHUB_OUTPUT"
              echo "Building existing tag ${REF}"
            else
              if [ -z "$RELEASE" ]; then
                echo "::error::ref '${REF}' is not a tag on GitHub. Set release_tag (e.g. v0.1.6) to build a branch."
                echo "Recent tags:"
                gh api "repos/${{ github.repository }}/tags" --jq '.[].name' | head -20 || true
                exit 1
              fi
              echo "checkout_ref=${REF}" >> "$GITHUB_OUTPUT"
              echo "release_tag=${RELEASE}" >> "$GITHUB_OUTPUT"
              echo "Building branch ${REF} as ${RELEASE}"
            fi
          else
            echo "checkout_ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi
          RELEASE_TAG="$(grep '^release_tag=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)"
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

  build-cli:
    needs: resolve
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      checkout_ref: ${{ needs.resolve.outputs.checkout_ref }}

  prepare-cli-bundle:
    needs: [resolve, build-cli]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: framework
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Download CLI artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Stage CLI bundles and update manifests
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          python3 scripts/update-cli-manifest.py \
            --version "$VERSION" \
            --artifacts ../artifacts \
            --out platform/manifest.json \
            --cli-out tools/gamedev-cli/manifest.json
          mkdir -p "release-artifacts/tools/v${VERSION}"
          shopt -s nullglob
          bundles=(../artifacts/*.zip ../artifacts/*.tar.gz)
          if [ "${#bundles[@]}" -eq 0 ]; then
            echo "::error::No CLI bundles found in artifacts"
            exit 1
          fi
          cp "${bundles[@]}" "release-artifacts/tools/v${VERSION}/"
          cp tools/gamedev-cli/manifest.json tools/gamedev-cli/install.ps1 tools/gamedev-cli/install.sh \
            release-artifacts/tools/
          python3 -c "
          import json, sys
          m = json.load(open('tools/gamedev-cli/manifest.json'))
          bad = [k for k, v in m.get('assets', {}).items() if v.get('sha256', '').startswith('000000')]
          if bad:
              print(f'::error::Placeholder checksums remain for: {bad}', file=sys.stderr)
              sys.exit(1)
          print('CLI manifest checksums verified')
          "

      - uses: actions/upload-artifact@v4
        with:
          name: cli-bundle-for-image
          path: |
            framework/platform/manifest.json
            framework/release-artifacts/tools/

  build-image:
    needs: [resolve, prepare-cli-bundle]
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ needs.resolve.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Merge CLI bundle into build context
        uses: actions/download-artifact@v4
        with:
          name: cli-bundle-for-image
          path: .

      - name: Verify CLI bundle in build context
        working-directory: framework
        run: |
          set -euo pipefail
          VERSION="${{ needs.resolve.outputs.version }}"
          ls -la "release-artifacts/tools/v${VERSION}/"
          test -f release-artifacts/tools/manifest.json
          test -f platform/manifest.json

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="${GHCR_TOKEN:-$GITHUB_TOKEN}"
          echo "$TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify prebuilt builder image
        run: |
          set -euo pipefail
          if ! docker pull --platform linux/arm64 "${{ env.BUILDER_IMAGE }}"; then
            echo "::error::Cannot pull ${{ env.BUILDER_IMAGE }}"
            echo "Private GHCR images pushed from your laptop need one of:"
            echo "  1. Package settings → Manage Actions access → add matusem/ipel-gamedev (Read)"
            echo "  2. Package settings → Change visibility → Public (recommended for builder tooling)"
            echo "  3. Repo secret GHCR_TOKEN = PAT with read:packages (classic) or packages:read"
            echo "Also ensure the image is linux/arm64 for Pi CI."
            exit 1
          fi
          docker image inspect "${{ env.BUILDER_IMAGE }}" --format 'platform={{.Os}}/{{.Architecture}}'

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve.outputs.release_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve.outputs.release_tag }}
            type=raw,value=latest,enable=${{ needs.resolve.outputs.release_tag != '' }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: framework
          file: framework/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            BUILDER_IMAGE=${{ env.BUILDER_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-image
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ needs.build-image.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Install signing dependency
        run: pip install pynacl

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_PRIVATE_KEY: ${{ secrets.DEPLOY_WEBHOOK_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          python3 framework/scripts/trigger-deploy-webhook.py \
            --image "${REGISTRY}/${IMAGE_NAME}" \
            --tag "${VERSION}"

      - name: Wait for health
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          BASE="${DEPLOY_WEBHOOK_URL%/}"
          for i in $(seq 1 60); do
            if curl -fsS "${BASE}/health" >/dev/null; then
              echo "healthy"
              exit 0
            fi
            echo "waiting for ${BASE}/health ($i/60)..."
            sleep 5
          done
          echo "health check timed out" >&2
          exit 1
