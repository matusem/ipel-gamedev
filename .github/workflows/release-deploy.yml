name: Release and Deploy

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Tag to build and deploy (e.g. v0.1.5)"
        default: "main"
        type: string
      deploy:
        description: "Call deploy webhook after image push"
        type: boolean
        default: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  BUILDER_IMAGE: ghcr.io/${{ github.repository }}-builder:bookworm

permissions:
  contents: write
  packages: write
  actions: write

jobs:
  resolve:
    runs-on: [self-hosted, Linux, ARM64, arianagrande]
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve release ref
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            REF="${{ inputs.ref }}"
            if gh api "repos/${{ github.repository }}/git/refs/tags/${REF}" >/dev/null 2>&1; then
              echo "checkout_ref=refs/tags/${REF}" >> "$GITHUB_OUTPUT"
              echo "release_tag=${REF}" >> "$GITHUB_OUTPUT"
            else
              echo "::error::workflow_dispatch ref must be an existing tag (e.g. v0.1.5)"
              exit 1
            fi
          else
            TAG="${{ github.ref_name }}"
            if [[ "$TAG" == gamedev-cli-v* ]]; then
              echo "::error::Platform release workflow only accepts v* tags"
              exit 1
            fi
            echo "checkout_ref=${{ github.ref }}" >> "$GITHUB_OUTPUT"
            echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          fi
          RELEASE_TAG="$(grep '^release_tag=' "$GITHUB_OUTPUT" | tail -1 | cut -d= -f2-)"
          echo "version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

  build-cli:
    needs: resolve
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      checkout_ref: ${{ needs.resolve.outputs.checkout_ref }}

  package-cli:
    needs: [resolve, build-cli]
    runs-on: [self-hosted, Linux, ARM64, arianagrande]
    defaults:
      run:
        working-directory: framework
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Download CLI build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Package CLI image bundle
        run: |
          set -euo pipefail
          python3 scripts/package-cli-image-bundle.py pack \
            --version "${{ needs.resolve.outputs.version }}" \
            --artifacts ../artifacts \
            --out cli-image-bundle.tar.gz

      - name: Verify CLI image bundle
        run: |
          python3 scripts/verify-cli-image-bundle.py \
            --version "${{ needs.resolve.outputs.version }}"

      - name: Upload CLI image bundle
        uses: actions/upload-artifact@v4
        with:
          name: cli-image-bundle
          path: framework/cli-image-bundle.tar.gz
          retention-days: 14

      - name: Upload raw CLI archives for GitHub Release
        uses: actions/upload-artifact@v4
        with:
          name: cli-release-archives
          path: artifacts/*
          retention-days: 14

  github-release:
    needs: [resolve, package-cli]
    runs-on: [self-hosted, Linux, ARM64, arianagrande]
    steps:
      - name: Download raw CLI archives
        uses: actions/download-artifact@v4
        with:
          name: cli-release-archives
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          files: artifacts/*
          generate_release_notes: true

  build-image:
    needs: [resolve, package-cli]
    runs-on: [self-hosted, Linux, ARM64, arianagrande]
    outputs:
      release_tag: ${{ needs.resolve.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Download CLI image bundle
        uses: actions/download-artifact@v4
        with:
          name: cli-image-bundle
          path: framework

      - name: Extract CLI image bundle into build context
        working-directory: framework
        run: |
          python3 scripts/package-cli-image-bundle.py extract \
            --tar cli-image-bundle.tar.gz

      - name: Verify CLI image bundle in build context
        working-directory: framework
        run: |
          python3 scripts/verify-cli-image-bundle.py \
            --version "${{ needs.resolve.outputs.version }}"

      - name: Set up QEMU
        if: runner.arch != 'ARM64'
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TOKEN="${GHCR_TOKEN:-$GITHUB_TOKEN}"
          echo "$TOKEN" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify prebuilt builder image
        run: |
          set -euo pipefail
          if ! docker pull --platform linux/arm64 "${{ env.BUILDER_IMAGE }}"; then
            echo "::error::Cannot pull ${{ env.BUILDER_IMAGE }}"
            exit 1
          fi
          docker image inspect "${{ env.BUILDER_IMAGE }}" --format 'platform={{.Os}}/{{.Architecture}}'

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}},value=${{ needs.resolve.outputs.release_tag }}
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.resolve.outputs.release_tag }}
            type=raw,value=latest,enable=${{ needs.resolve.outputs.release_tag != '' }}

      - name: Build and push (linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: framework
          file: framework/Dockerfile
          platforms: linux/arm64
          push: true
          build-args: |
            BUILDER_IMAGE=${{ env.BUILDER_IMAGE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify CLI files inside built image
        env:
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.resolve.outputs.version }}
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          docker pull --platform linux/arm64 "${IMAGE}"
          docker run --rm --platform linux/arm64 --entrypoint /bin/sh "${IMAGE}" -c "
            set -e
            test -f /app/tools/gamedev-cli/manifest.json
            test -f /app/platform/manifest.json
            ls /app/tools/gamedev-cli/v${VERSION}/gamedev-cli-linux-x86_64.tar.gz
            ls /app/tools/gamedev-cli/v${VERSION}/gamedev-cli-windows-x86_64.zip
          "

  deploy:
    needs: build-image
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.deploy)
    runs-on: [self-hosted, Linux, ARM64, arianagrande]
    env:
      RELEASE_TAG: ${{ needs.build-image.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pynacl-${{ runner.os }}-v1
          restore-keys: |
            pip-pynacl-${{ runner.os }}-v1

      - name: Install signing dependency
        run: pip install pynacl

      - name: Trigger deploy webhook
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
          DEPLOY_WEBHOOK_PRIVATE_KEY: ${{ secrets.DEPLOY_WEBHOOK_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          VERSION="${RELEASE_TAG#v}"
          python3 framework/scripts/trigger-deploy-webhook.py \
            --image "${REGISTRY}/${IMAGE_NAME}" \
            --tag "${VERSION}"

      - name: Wait for health
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          set -euo pipefail
          BASE="${DEPLOY_WEBHOOK_URL%/}"
          for i in $(seq 1 60); do
            if curl -fsS "${BASE}/health" >/dev/null; then
              echo "healthy"
              exit 0
            fi
            echo "waiting for ${BASE}/health ($i/60)..."
            sleep 5
          done
          echo "health check timed out" >&2
          exit 1
