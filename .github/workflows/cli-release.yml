name: CLI Release

on:
  push:
    tags:
      # Platform releases (v1.2.3) — same tag also publishes CLI binaries to GitHub Releases.
      - "v*"
      # CLI-only patch releases without redeploying the platform image.
      - "gamedev-cli-v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

defaults:
  run:
    working-directory: framework

jobs:
  build-cli:
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      checkout_ref: ${{ github.ref }}

  release:
    needs: build-cli
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute manifest checksums and stage image bundle
        id: manifest
        working-directory: framework
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#gamedev-cli-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          python3 scripts/update-cli-manifest.py \
            --version "$VERSION" \
            --artifacts ../artifacts \
            --out platform/manifest.json \
            --cli-out tools/gamedev-cli/manifest.json
          mkdir -p "release-artifacts/tools/v${VERSION}"
          shopt -s nullglob
          bundles=(../artifacts/*.zip ../artifacts/*.tar.gz)
          if [ "${#bundles[@]}" -eq 0 ]; then
            echo "::error::No CLI bundles found in artifacts"
            exit 1
          fi
          cp "${bundles[@]}" "release-artifacts/tools/v${VERSION}/"
          cp tools/gamedev-cli/manifest.json tools/gamedev-cli/install.ps1 tools/gamedev-cli/install.sh \
            release-artifacts/tools/
          python3 -c "
          import json, sys
          m = json.load(open('tools/gamedev-cli/manifest.json'))
          bad = [k for k, v in m.get('assets', {}).items() if v.get('sha256', '').startswith('000000')]
          if bad:
              print(f'::error::Placeholder checksums remain for: {bad}', file=sys.stderr)
              sys.exit(1)
          print('CLI manifest checksums verified')
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true

      - name: Upload Docker image CLI bundle
        uses: actions/upload-artifact@v4
        with:
          name: cli-bundle-for-image
          path: |
            framework/platform/manifest.json
            framework/release-artifacts/tools/
