name: CLI Release

on:
  push:
    tags:
      # CLI-only releases without redeploying the platform image.
      - "gamedev-cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing gamedev-cli-v* tag to publish (must exist on GitHub)"
        required: true
        type: string

permissions:
  contents: write

defaults:
  run:
    working-directory: framework

jobs:
  resolve:
    runs-on: self-hosted
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve CLI release ref
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          TAG="${TAG#refs/tags/}"
          if [[ "$TAG" != gamedev-cli-v* ]]; then
            echo "::error::CLI Release only accepts gamedev-cli-v* tags"
            exit 1
          fi
          HTTP_CODE="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${GITHUB_REPOSITORY}/git/ref/tags/${TAG}")"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Tag ${TAG} not found on GitHub (HTTP ${HTTP_CODE})"
            exit 1
          fi
          echo "checkout_ref=refs/tags/${TAG}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#gamedev-cli-v}" >> "$GITHUB_OUTPUT"

  build-cli:
    needs: resolve
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      checkout_ref: ${{ needs.resolve.outputs.checkout_ref }}

  release:
    needs: [resolve, build-cli]
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update CLI manifests
        working-directory: framework
        run: |
          set -euo pipefail
          python3 scripts/update-cli-manifest.py \
            --version "${{ needs.resolve.outputs.version }}" \
            --artifacts ../artifacts \
            --out platform/manifest.json \
            --cli-out tools/gamedev-cli/manifest.json
          python3 -c "
          import json, sys
          m = json.load(open('tools/gamedev-cli/manifest.json'))
          bad = [k for k, v in m.get('assets', {}).items() if v.get('sha256', '').startswith('000000')]
          if bad:
              print(f'::error::Placeholder checksums remain for: {bad}', file=sys.stderr)
              sys.exit(1)
          "

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.resolve.outputs.release_tag }}
          files: artifacts/*
          generate_release_notes: true
