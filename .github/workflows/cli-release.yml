name: CLI Release

on:
  push:
    tags:
      # Platform releases (v1.2.3) — same tag also publishes CLI binaries to GitHub Releases.
      - "v*"
      # CLI-only patch releases without redeploying the platform image.
      - "gamedev-cli-v*"
  workflow_dispatch:

permissions:
  contents: write

defaults:
  run:
    working-directory: framework

jobs:
  build-cli:
    uses: ./.github/workflows/reusable-build-cli.yml
    with:
      checkout_ref: ${{ github.ref }}

  release:
    needs: build-cli
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute manifest checksums
        id: manifest
        working-directory: framework
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION#gamedev-cli-v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          python3 scripts/update-cli-manifest.py \
            --version "$VERSION" \
            --artifacts ../artifacts \
            --out platform/manifest.json \
            --cli-out tools/gamedev-cli/manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: artifacts/*
          generate_release_notes: true

      - name: Upload CLI bundles to release assets folder
        working-directory: framework
        run: |
          mkdir -p tools/gamedev-cli/v${{ steps.manifest.outputs.version }}
          cp ../artifacts/*.zip ../artifacts/*.tar.gz \
            tools/gamedev-cli/v${{ steps.manifest.outputs.version }}/ 2>/dev/null || true
