name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUNNER_LABELS: '["self-hosted","Linux","ARM64","arianagrande"]'

defaults:
  run:
    working-directory: framework

jobs:
  rust:
    runs-on: ${{ fromJSON(env.RUNNER_LABELS) }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: framework
          cache-all-crates: true
          cache-on-failure: true

      - uses: ./.github/actions/cache-cargo-tools
        with:
          cache-key: ${{ hashFiles('framework/Cargo.lock', 'framework/lobby/Cargo.toml') }}

      - name: Cache apt packages (Bevy SDK)
        uses: actions/cache@v4
        with:
          path: |
            ~/ci-apt-cache/archives
          key: apt-bevy-${{ runner.os }}-v1
          restore-keys: |
            apt-bevy-${{ runner.os }}-v1

      - name: Install Linux dependencies (Bevy SDK)
        run: |
          sudo mkdir -p ~/ci-apt-cache/archives/partial
          echo 'Dir::Cache::archives "'"$HOME"'/ci-apt-cache/archives";' | sudo tee /etc/apt/apt.conf.d/99-ci-cache
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libudev-dev \
            pkg-config \
            libxkbcommon-dev \
            libwayland-dev \
            libx11-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev

      - name: Check formatting (optional)
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true

      - name: Install WASM component tooling
        run: |
          rustup target add wasm32-wasip1
          command -v cargo-component >/dev/null || cargo install cargo-component --locked

      - name: Stage tic_tac_toe test fixture
        run: bash sdk/scripts/stage-tic-tac-toe-fixture.sh

      - name: Test workspace
        run: cargo test --workspace

      - name: CLI Dioxus smoke (optional)
        run: cargo test -p gamedev-cli smoke_rust_dioxus -- --ignored
        env:
          GAMEDEV_CLI_SMOKE: "1"
        continue-on-error: true

  lobby:
    runs-on: ${{ fromJSON(env.RUNNER_LABELS) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: framework/lobby/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            framework
            framework/lobby
          cache-all-crates: true
          cache-on-failure: true

      - uses: ./.github/actions/cache-cargo-tools
        with:
          cache-key: ${{ hashFiles('framework/Cargo.lock', 'framework/lobby/Cargo.toml') }}

      - name: Install Dioxus CLI
        run: command -v dx >/dev/null || cargo install dioxus-cli --locked

      - name: Build lobby CSS
        working-directory: framework/lobby
        run: npm ci && npm run build:css

      - name: Build lobby WASM
        working-directory: framework/lobby
        run: dx build --platform web

  java-component:
    runs-on: ${{ fromJSON(env.RUNNER_LABELS) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.12.1"
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('framework/sdk/java/component-template/pom.xml', 'framework/sdk/java/component-template/build.gradle.kts') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: framework
          shared-key: wasm-tools
          cache-all-crates: true
          cache-on-failure: true

      - uses: ./.github/actions/cache-cargo-tools
        with:
          cache-key: ${{ hashFiles('framework/Cargo.lock') }}

      - name: Install wasm-tools
        run: command -v wasm-tools >/dev/null || cargo install wasm-tools --locked

      - name: Export and validate Java logic.wasm
        working-directory: framework/sdk/java/component-template
        run: |
          chmod +x mvnw
          wasm-tools parse wasm/teavm_ascii.wat -o wasm/teavm_ascii.wasm
          gradle exportLogicComponent --no-daemon -q
          wasm-tools component wit build/out/logic.wasm

  game-sdk:
    runs-on: ${{ fromJSON(env.RUNNER_LABELS) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: framework/packages/game-sdk/package-lock.json

      - name: Build game-sdk
        working-directory: framework/packages/game-sdk
        run: npm ci && npm run build
