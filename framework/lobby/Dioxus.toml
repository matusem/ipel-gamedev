[application]
name = "lobby"
default_platform = "web"

[web.app]
title = "IPEL GameDev"

# `dx serve` runs on :8080; proxy HTTP API routes to the Actix server on :8081.
# WebSockets bypass this proxy and connect directly to :8081 (see lobby/src/api/graphql.rs `ws_host`).
# Start backend: .\scripts\dev-backend.ps1  (or: $env:PORT=8081; cargo run -p server)
[[web.proxy]]
backend = "http://127.0.0.1:8081/graphql"

[[web.proxy]]
backend = "http://127.0.0.1:8081/game"

[[web.proxy]]
backend = "http://127.0.0.1:8081/games"

[[web.proxy]]
backend = "http://127.0.0.1:8081/lib"
