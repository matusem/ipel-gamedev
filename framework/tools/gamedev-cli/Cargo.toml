[package]
name = "gamedev-cli"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1"
base64 = "0.22"
clap = { version = "4", features = ["derive"] }
ctrlc = "3"
crossterm = "0.29"
dirs = "6"
ratatui = "0.29"
reqwest = { version = "0.12", features = ["json", "rustls-tls", "blocking"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tempfile = "3"
toml = "0.9"
pathdiff = "0.2"
uuid = { version = "1", features = ["v4"] }
zip = "4"
