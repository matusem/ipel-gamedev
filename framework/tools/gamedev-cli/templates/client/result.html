<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Match result</title>
  <style>
    :root { color-scheme: dark; }
    body { margin: 0; min-height: 100vh; font-family: system-ui, sans-serif; background: #111827; color: #f9fafb; padding: 1rem; }
    .wrap { max-width: 32rem; margin: 0 auto; }
    h1 { font-size: 1.5rem; font-weight: 700; margin: 0 0 0.25rem; }
    h2 { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #9ca3af; margin: 0 0 0.5rem; }
    code { font-family: ui-monospace, monospace; font-size: 0.875rem; color: #9ca3af; }
    .meta { color: #6b7280; font-size: 0.875rem; margin-bottom: 1.5rem; }
    .section { margin-bottom: 1.5rem; }
    ul.outcomes { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.5rem; }
    li.row {
      display: flex; align-items: center; justify-content: space-between; gap: 0.5rem;
      background: #1f2937; border: 1px solid #374151; border-radius: 0.5rem; padding: 0.5rem 0.75rem;
    }
    .player { font-family: ui-monospace, monospace; font-weight: 600; word-break: break-all; }
    .score { color: #9ca3af; font-size: 0.875rem; }
    .badge { font-size: 0.75rem; padding: 0.125rem 0.5rem; border-radius: 0.25rem; font-weight: 500; }
    .b-win { background: rgba(6, 78, 59, 0.8); color: #a7f3d0; }
    .b-loss { background: rgba(127, 29, 29, 0.8); color: #fecaca; }
    .b-draw { background: rgba(120, 53, 15, 0.8); color: #fde68a; }
    .b-other { background: #374151; color: #e5e7eb; }
    table { width: 100%; border-collapse: collapse; font-size: 0.75rem; border: 1px solid #374151; border-radius: 0.5rem; overflow: hidden; }
    th, td { text-align: left; padding: 0.5rem; border-top: 1px solid #374151; }
    thead th { background: #1f2937; color: #6b7280; font-weight: 600; border-top: none; }
    tbody tr:nth-child(even) { background: rgba(17, 24, 39, 0.5); }
    .foot { font-size: 0.75rem; color: #4b5563; margin-top: 1rem; }
    .err { color: #fca5a5; }
    .warn { color: #fde68a; }
    details { margin-top: 1.5rem; font-size: 0.75rem; color: #9ca3af; }
    details pre { background: #030712; border: 1px solid #374151; border-radius: 0.5rem; padding: 0.75rem; overflow-x: auto; color: #d1d5db; }
  </style>
</head>
<body>
  <div id="root" class="wrap"><p class="meta">Loading…</p></div>
  <script>
    (function () {
      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }
      function normalizePlayerKey(k) {
        if (k == null) return "?";
        var t = String(k);
        if (t.charAt(0) === '"' && t.charAt(t.length - 1) === '"') {
          try { return JSON.parse(t); } catch (e) { return t.slice(1, -1); }
        }
        return t;
      }
      function outcomeClass(out) {
        if (out === "Win") return "b-win";
        if (out === "Loss") return "b-loss";
        if (out === "Draw") return "b-draw";
        return "b-other";
      }

      var root = document.getElementById("root");
      var params = new URLSearchParams(window.location.search);
      var raw = params.get("payload");
      if (raw === null || raw === "") {
        root.innerHTML =
          '<p class="warn">Missing <code>payload</code> query parameter (URI-encoded JSON from the lobby).</p>';
        return;
      }
      var data;
      try {
        data = JSON.parse(decodeURIComponent(raw));
      } catch (e) {
        root.innerHTML = '<p class="err">Invalid JSON in <code>payload</code>.</p>';
        return;
      }

      var result = data.result && typeof data.result === "object" ? data.result : {};
      var outcomes = result.per_player_outcome && typeof result.per_player_outcome === "object"
        ? result.per_player_outcome
        : {};
      var scores = data.scores && typeof data.scores === "object" && !Array.isArray(data.scores) ? data.scores : {};
      var seats = Array.isArray(data.seats) ? data.seats : [];

      var title = escapeHtml(data.gameType || "Game");
      var gid = escapeHtml(data.gameId || "");
      var lobby = data.lobbyId != null ? escapeHtml(String(data.lobbyId)) : "";
      var finished = Number(data.finishedAt) || 0;

      var html = "";
      html += "<h1>" + title + "</h1>";
      html += '<p class="meta">Game <code>' + gid + "</code></p>";
      if (lobby) html += '<p class="meta">Lobby <code>' + lobby + "</code></p>";

      html += '<div class="section"><h2>Outcomes</h2>';
      var keys = Object.keys(outcomes);
      if (!keys.length) {
        html += '<p class="meta">No per-player outcomes in payload.</p>';
      } else {
        html += '<ul class="outcomes">';
        for (var i = 0; i < keys.length; i++) {
          var rawK = keys[i];
          if (!Object.prototype.hasOwnProperty.call(outcomes, rawK)) continue;
          var k = normalizePlayerKey(rawK);
          var out = outcomes[rawK];
          var sc = scores[rawK] !== undefined ? scores[rawK] : scores[k];
          var scoreStr = typeof sc === "number" ? sc.toFixed(2) : "";
          var cls = outcomeClass(String(out));
          html += '<li class="row"><span class="player">' + escapeHtml(String(k)) + "</span>";
          html += '<span style="display:flex;align-items:center;gap:0.5rem">';
          if (scoreStr !== "") html += '<span class="score">' + escapeHtml(scoreStr) + "</span>";
          html += '<span class="badge ' + cls + '">' + escapeHtml(String(out)) + "</span></span></li>";
        }
        html += "</ul>";
      }
      html += "</div>";

      if (seats.length) {
        html += '<div class="section"><h2>Seats</h2><table><thead><tr><th>#</th><th>Role</th><th>Player</th></tr></thead><tbody>';
        for (var j = 0; j < seats.length; j++) {
          var s = seats[j] || {};
          var idx = s.seat_index != null ? s.seat_index : s.seatIndex;
          var id = s.player_identity != null ? s.player_identity : s.playerIdentity;
          var name = s.claimed_display_name != null ? s.claimed_display_name : s.claimedDisplayName || "—";
          html += "<tr><td>" + escapeHtml(String(idx != null ? idx : "")) + "</td>";
          html += "<td>" + escapeHtml(String(id != null ? id : "")) + "</td>";
          html += "<td>" + escapeHtml(String(name)) + "</td></tr>";
        }
        html += "</tbody></table></div>";
      }

      html += '<p class="foot">Finished at UNIX ' + finished + "</p>";
      html +=
        "<details><summary>Raw payload (debug)</summary><pre>" +
        escapeHtml(JSON.stringify(data, null, 2)) +
        "</pre></details>";

      root.innerHTML = html;
    })();
  </script>
</body>
</html>
