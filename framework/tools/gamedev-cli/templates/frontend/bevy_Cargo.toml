[package]
name = "bevy_frontend"
version = "0.1.0"
edition = "2024"

[dependencies]
bevy = { version = "0.15", default-features = false, features = [
    "default_font",
    "bevy_asset",
    "bevy_core_pipeline",
    "bevy_render",
    "bevy_sprite",
    "bevy_text",
    "bevy_ui",
    "bevy_winit",
    "png",
    "webgl2",
] }
shared-types = { package = "__SHARED_TYPES_NAME__", path = "../../backend/rust/shared-types" }
__SDK_BEVY_LINE__

[target.wasm32-unknown-unknown.dependencies]
getrandom = { version = "0.3", features = ["wasm_js"] }
