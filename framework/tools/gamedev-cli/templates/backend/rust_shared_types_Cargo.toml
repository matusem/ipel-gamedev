[package]
name = "__SHARED_TYPES_NAME__"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
upjs-gdd-shared-types = { path = "../../../../sdk/rust/shared-types" }
ts-rs = { version = "10", optional = true }
schemars = { version = "0.8", optional = true }

[features]
default = []
typegen = ["dep:ts-rs"]
schemars = ["dep:schemars"]

[[bin]]
name = "export_ts"
path = "src/bin/export_ts.rs"
required-features = ["typegen"]

[[bin]]
name = "export_schema"
path = "src/bin/export_schema.rs"
required-features = ["schemars"]
