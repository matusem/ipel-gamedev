<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #board {
      display: grid;
      grid-template-columns: repeat(var(--side, 3), var(--cell, 5.5rem));
      gap: 0.5rem;
      width: fit-content;
      max-width: min(96vw, 96vh);
      margin: 0 auto 1rem;
    }
    #board button {
      width: var(--cell, 5.5rem);
      height: var(--cell, 5.5rem);
      font-size: clamp(1rem, calc(var(--cell, 5.5rem) * 0.45), 2rem);
      font-weight: 700;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
    }
    #board button.empty { background: #374151; color: #fff; }
    #board button.empty:hover { background: #4b5563; }
    #board button.x { background: #1e40af; color: #bfdbfe; cursor: default; }
    #board button.o { background: #991b1b; color: #fecaca; cursor: default; }
  </style>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
  <div id="app" class="text-center px-2">
    <h1 class="text-3xl font-bold mb-2">Tic Tac Toe</h1>
    <p id="status" class="text-lg mb-4 text-gray-300">Connecting...</p>
    <div id="board" aria-label="Tic tac toe board"></div>
    <p id="player-info" class="text-sm text-gray-500"></p>
  </div>

  <script src="/lib/game-client.js"></script>
  <script>
    /** @type {(null|string)[]} */
    let board = [];
    let sideLength = 3;
    let winLength = 3;
    let myPlayer = null;
    let currentPlayer = null;
    let gameOver = false;

    function decodePlayerParam(raw) {
      if (raw == null || raw === "") return null;
      const t = raw.trim();
      if ((t.startsWith('"') && t.endsWith('"')) || (t.startsWith("'") && t.endsWith("'"))) {
        try {
          return JSON.parse(t.startsWith("'") ? `"${t.slice(1, -1)}"` : t);
        } catch {
          return t.slice(1, -1);
        }
      }
      return t;
    }

    function normalizePlayer(p) {
      if (p == null) return null;
      if (typeof p === "string") return p;
      if (typeof p === "object") {
        if ("X" in p && p.X === null) return "X";
        if ("O" in p && p.O === null) return "O";
      }
      return String(p);
    }

    function normalizeCell(c) {
      if (c == null) return null;
      return normalizePlayer(c);
    }

    function cellRem(side) {
      if (side <= 4) return 5.5;
      if (side <= 7) return 4;
      if (side <= 10) return 3;
      return Math.max(2.25, 36 / side);
    }

    const params = new URLSearchParams(window.location.search);
    myPlayer = decodePlayerParam(params.get("player"));

    const boardEl = document.getElementById("board");
    const statusEl = document.getElementById("status");
    const playerInfoEl = document.getElementById("player-info");

    playerInfoEl.textContent = `You are: ${myPlayer ?? "?"}`;

    function rebuildBoardDom(side) {
      const cell = `${cellRem(side)}rem`;
      boardEl.style.setProperty("--side", String(side));
      boardEl.style.setProperty("--cell", cell);
      boardEl.replaceChildren();
      board = Array(side * side).fill(null);
      for (let i = 0; i < side * side; i++) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.dataset.index = String(i);
        btn.className = "empty";
        btn.addEventListener("click", () => onCellClick(Number(btn.dataset.index)));
        boardEl.appendChild(btn);
      }
      sideLength = side;
    }

    function inferSideFromBoard(b) {
      if (b == null) return null;
      let cells = b;
      if (Array.isArray(b) && b.length === 1 && Array.isArray(b[0])) cells = b[0];
      if (!Array.isArray(cells) || cells.length === 0) return null;
      const n = cells.length;
      const s = Math.round(Math.sqrt(n));
      return s * s === n ? s : null;
    }

    function ensureBoardFromConfig(side, win) {
      const s = Number(side);
      const w = Number(win);
      if (!Number.isFinite(s) || s < 2) return;
      winLength = Number.isFinite(w) && w >= 2 ? w : s;
      if (sideLength !== s || boardEl.querySelectorAll("button[data-index]").length !== s * s) {
        rebuildBoardDom(s);
      }
    }

    function renderBoard() {
      const cells = boardEl.querySelectorAll("button[data-index]");
      const n = sideLength * sideLength;
      for (let i = 0; i < n; i++) {
        const val = board[i];
        const el = cells[i];
        if (!el) continue;
        el.textContent = val || "";
        el.className = val ? (val === "X" ? "x" : "o") : "empty";
      }
    }

    function updatePlayerInfo() {
      playerInfoEl.textContent = `You are: ${myPlayer ?? "?"} · ${sideLength}×${sideLength}, ${winLength} in a row`;
    }

    function updateStatus() {
      if (gameOver) return;
      const cp = currentPlayer ?? "?";
      if (currentPlayer != null && myPlayer != null && currentPlayer === myPlayer) {
        statusEl.textContent = "Your turn!";
        statusEl.className = "text-lg mb-4 text-green-400";
      } else {
        statusEl.textContent = `Waiting for ${cp}...`;
        statusEl.className = "text-lg mb-4 text-yellow-400";
      }
    }

    function onCellClick(index) {
      if (gameOver || board[index] || currentPlayer !== myPlayer) return;
      const row = Math.floor(index / sideLength);
      const col = index % sideLength;
      client.sendAction([row, col]);
    }

    function applyState(state) {
      if (!state || typeof state !== "object") return;

      let inner = state;
      if (state.state != null && typeof state.state === "object") {
        inner = state.state;
      }

      let side = 3;
      let win = 3;
      if (inner.config != null && typeof inner.config === "object") {
        side = Number(inner.config.side_length);
        win = Number(inner.config.win_length);
      } else {
        const inferred = inferSideFromBoard(inner.board);
        if (inferred != null) {
          side = inferred;
          win = inferred;
        }
      }
      if (!Number.isFinite(side) || side < 2) side = 3;
      if (!Number.isFinite(win) || win < 2) win = side;
      ensureBoardFromConfig(side, win);
      updatePlayerInfo();

      if (inner.current_player !== undefined) {
        currentPlayer = normalizePlayer(inner.current_player);
      }

      const b = inner.board;
      if (b != null) {
        let cells = b;
        if (Array.isArray(b) && b.length === 1 && Array.isArray(b[0])) {
          cells = b[0];
        }
        const total = sideLength * sideLength;
        if (Array.isArray(cells)) {
          for (let i = 0; i < total; i++) board[i] = normalizeCell(cells[i]);
        } else if (typeof b === "object" && b["0"] !== undefined) {
          for (let i = 0; i < total; i++) board[i] = normalizeCell(b[String(i)]);
        }
      }

      renderBoard();
      updateStatus();
    }

    function applyEvent(event) {
      if (event && event.Event) {
        const { player, action } = event.Event;
        const p = normalizePlayer(player);
        const [row, col] = action;
        const index = row * sideLength + col;
        board[index] = p;
        currentPlayer = currentPlayer === "X" ? "O" : "X";
        renderBoard();
        updateStatus();
      } else if (event && event.GameOver !== undefined) {
        gameOver = true;
        const winner = normalizePlayer(event.GameOver);
        if (winner === myPlayer) {
          statusEl.textContent = "You win!";
          statusEl.className = "text-lg mb-4 text-green-400 font-bold";
        } else {
          statusEl.textContent = `${winner ?? "?"} wins!`;
          statusEl.className = "text-lg mb-4 text-red-400 font-bold";
        }
      }
    }

    let client;
    try {
      client = GameClient.fromUrlParams();
      client
        .onState((state) => {
          statusEl.textContent = "Connected!";
          applyState(state);
        })
        .onEvent((event) => {
          applyEvent(event);
        })
        .onError(() => {
          statusEl.textContent = "Connection error";
          statusEl.className = "text-lg mb-4 text-red-400";
        })
        .onClose(() => {
          if (!gameOver) {
            statusEl.textContent = "Disconnected";
            statusEl.className = "text-lg mb-4 text-gray-500";
          }
        });
    } catch (e) {
      statusEl.textContent = e.message;
      statusEl.className = "text-lg mb-4 text-red-400";
    }
  </script>
</body>
</html>
