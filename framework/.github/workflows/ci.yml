name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Stage tic_tac_toe test fixture
        run: bash sdk/scripts/stage-tic-tac-toe-fixture.sh

      - name: Test workspace
        run: cargo test --workspace

      - name: CLI Dioxus smoke (optional)
        run: cargo test -p gamedev-cli smoke_rust_dioxus -- --ignored
        env:
          GAMEDEV_CLI_SMOKE: "1"
        continue-on-error: true

  lobby:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lobby

      - name: Install Dioxus CLI
        run: cargo install dioxus-cli --locked

      - name: Build lobby CSS
        working-directory: lobby
        run: npm ci && npm run build:css

      - name: Build lobby WASM
        working-directory: lobby
        run: dx build --platform web

  java-component:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install wasm-tools
        run: cargo install wasm-tools --locked

      - name: Export and validate Java logic.wasm
        working-directory: sdk/java/component-template
        run: |
          chmod +x gradlew mvnw 2>/dev/null || true
          ./gradlew exportLogicComponent --no-daemon -q
          wasm-tools component wit build/out/logic.wasm

  game-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build game-sdk
        working-directory: packages/game-sdk
        run: npm ci && npm run build
