# Production stack for Raspberry Pi 5 / single-node hosts.
# Bind the app to localhost only; expose HTTPS via nginx on the public server (see deploy/).

services:
  gamedev:
    image: ${GAMEDEV_IMAGE:-ghcr.io/matusem/ipel-gamedev:latest}
    container_name: upjs-gdd
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # App always listens on 8080 inside the container; HOST_PORT is the Pi loopback bind.
      PORT: "8080"
    ports:
      # Loopback only — reverse proxy on the public host forwards here.
      - "127.0.0.1:${HOST_PORT:-8080}:8080"
    volumes:
      - upjs-gdd-data:/app/data
      - upjs-gdd-games:/app/games
      - upjs-gdd-drafts:/app/drafts
      # Deploy webhook: pull/up via host Docker (see deploy/README.md)
      - /var/run/docker.sock:/var/run/docker.sock
      - ${DEPLOY_COMPOSE_HOST_DIR:-/opt/upjs-gdd/ipel-gamedev/framework}:/deploy:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  upjs-gdd-data:
  upjs-gdd-games:
  upjs-gdd-drafts:
